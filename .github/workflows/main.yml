name: AI Triage Service (unit tests)

on:
  workflow_dispatch:
  push:
    paths:
      - "ai-service/**"
      - ".github/workflows/ai-triage.yml"

jobs:
  test-ai-service:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-service

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
    - name: Debug Repository Structure
      run: |
        echo "Current Directory:"
        pwd
        echo "Repository Root:"
        ls -la
        echo "Directory Tree:"
        find . -maxdepth 3 -type d

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run unit tests
        run: pytest -q

      - name: Smoke test triage (mock LLM)
        env:
          LLM_MOCK_MODE: "true"
        run: python scripts/run_triage.py reports/consolidated_report.json --scan-id ci-smoke
